# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
gui:
  nerdFontsVersion: "3"
  showRandomTip: false
  commitHashLength: 8
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - default
git:
  pager: delta --color-only
skipStashWarning: true
